<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Paint</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="hud">
    <div id="brushPreview"><div id="brushDot"></div><span id="brushSize">8px</span></div>
    <div id="gestureLabel">Loading...</div>
  </div>

  <div id="opacityPanel">
    <label>📷 <span id="camOpacityVal">10%</span></label>
    <input type="range" id="camOpacity" min="0" max="1" step="0.05" value="0.10">
  </div>

  <div id="statusBar"><span id="fps">--</span></div>

  <div id="actions">
    <button id="btnUndo" title="Undo (pinky)">↩</button>
    <button id="btnClear" title="Clear (wave)">🗑</button>
    <button id="btnSave" title="Save PNG">💾</button>
    <button id="btnPalette" title="Colors (open hand)">🎨</button>
  </div>

  <div id="palette" class="hidden">
    <div id="colorGrid"></div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p id="loadingText">Loading Hand Tracker...</p>
    <div id="loadingBar"><div id="loadingFill"></div></div>
  </div>

  <div id="error" class="hidden">
    <p id="errorMsg"></p>
    <button id="btnRetry">Retry</button>
  </div>

  <script type="importmap">
  { "imports": { "vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs" } }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
