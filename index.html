<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hand Paint — MediaPipe Holistic + WASM</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✋</text></svg>">
</head>
<body>

  <!-- Hidden webcam — must be rendered (not display:none) for frame decoding -->
  <video id="webcam" autoplay playsinline muted></video>

  <!-- Main canvas (full viewport) — composites camera → paint → skeleton -->
  <canvas id="paintCanvas"></canvas>

  <!-- Status bar (top-right) -->
  <div id="statusBar">
    <span id="pipStatus">Starting...</span>
  </div>

  <!-- Opacity controls (top-left, below HUD) -->
  <div id="opacityControls" class="panel">
    <div class="opacity-row">
      <label>📷 Camera</label>
      <input type="range" id="cameraOpacitySlider" min="0" max="1" step="0.05" value="0.3">
      <span id="cameraOpacityVal">30%</span>
    </div>
  </div>

  <!-- Color palette panel (hidden by default) -->
  <div id="colorPalette" class="panel hidden">
    <div class="panel-title">Colors</div>
    <div class="color-grid" id="colorGrid"></div>
    <div class="quick-colors" id="quickColors"></div>
  </div>

  <!-- Actions panel (bottom-right) -->
  <div id="actionsPanel">
    <button class="action-btn" id="btnUndo" title="Undo (pinky up)">↩</button>
    <button class="action-btn" id="btnRedo" title="Redo">↪</button>
    <button class="action-btn" id="btnClear" title="Clear canvas (fist 2s)">🗑</button>
    <button class="action-btn" id="btnSave" title="Save as PNG">💾</button>
    <button class="action-btn" id="btnPalette" title="Colors (open palm)">🎨</button>
  </div>

  <!-- Brush HUD (top-left) -->
  <div id="brushHud">
    <div id="brushPreview" class="hud-item">
      <div id="brushDot"></div>
      <span id="brushSize">8px</span>
    </div>
    <div id="gestureIndicator" class="hud-item">
      <span id="gestureLabel">Initializing...</span>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingText">Loading MediaPipe Holistic...</p>
    <p class="loading-sub">WASM + GPU acceleration</p>
    <div id="loadingBar"><div id="loadingProgress"></div></div>
  </div>

  <!-- Error overlay -->
  <div id="errorOverlay" class="hidden">
    <div class="error-box">
      <h2>⚠️ Camera Required</h2>
      <p id="errorMessage">Please allow camera access.</p>
      <button id="retryBtn">Retry</button>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
